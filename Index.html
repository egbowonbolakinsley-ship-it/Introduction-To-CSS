<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction To CSS</title>
</head>
<body>
     <style>
        h2{
            background-color: blue; text-align: center; color: darkblue;
        }
        p {
            background-color: red; text-align: center; color:  white;
        }
        #box {
            color: blue;
            margin: 100px 150px 300px 400px;
            border: 2px solid blue; 
            padding: 40px;
        }
    </style>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <h1 style="background-color: blue; text-align: center; color: white;">
        Welcome to class everyone
    </h1>
    <h2>
        Yeah the students are happy to be in class, Thank you Mr David.
    </h2>
    <p>
        Yes ooo Mr Peter was laughing the other time, he his happy to be in class
    </p>
    <h4>
        Hmmmmm The class is already getting interesting and simple
    </h4>


    <!-- 
    Cascading Style Sheet - Enhances the beauty of your webpages

    Inline CSS- Inside the line of code where you need it
    Internal CSS-  Inside the html file 
    External CSS- In a separate file

    Selectors     Element Selector (h1)
                  Class Selector (class="myLogo") dot. is the signature of the class
                  ID Selector hash# is the signature of the class 
                  * Universal selector        
    -->

    <h1 id="box">Hello Box</h1>

    <!-- Margin - Space Outside the border
         Padding - Space outside the border
         Border- Is the edge surrounding content & padding
         Content-->
</body>
</html>
